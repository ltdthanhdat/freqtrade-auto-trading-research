services:
  freqtrade-demo:
    image: freqtradeorg/freqtrade:develop
    working_dir: /workspace
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Ho_Chi_Minh}
      PYTHONPATH: /workspace
      FREQTRADE__EXCHANGE__KEY: ${FREQTRADE_DEMO_KEY:-}
      FREQTRADE__EXCHANGE__SECRET: ${FREQTRADE_DEMO_SECRET:-}
      FREQTRADE__TELEGRAM__ENABLED: ${FREQTRADE_TELEGRAM_ENABLED:-false}
      FREQTRADE__TELEGRAM__TOKEN: ${FREQTRADE_TELEGRAM_TOKEN:-}
      FREQTRADE__TELEGRAM__CHAT_ID: ${FREQTRADE_TELEGRAM_CHAT_ID:-}
      FREQTRADE__DB_URL: sqlite:////workspace/user_data/tradesv3.demo.sqlite
    volumes:
      - ./:/workspace
    command:
      - trade
      - --config
      - /workspace/config/config.futures.json
      - --config
      - /workspace/config/config.binance.demo.json
      - --strategy
      - SMC_FVG_Context30m_Freqtrade
      - --strategy-path
      - /workspace/src/strategies
      - --logfile
      - /workspace/user_data/logs/freqtrade-demo.log

  freqtrade-live:
    image: freqtradeorg/freqtrade:develop
    working_dir: /workspace
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Ho_Chi_Minh}
      PYTHONPATH: /workspace
      FREQTRADE__EXCHANGE__KEY: ${FREQTRADE_LIVE_KEY:-}
      FREQTRADE__EXCHANGE__SECRET: ${FREQTRADE_LIVE_SECRET:-}
      FREQTRADE__TELEGRAM__ENABLED: ${FREQTRADE_TELEGRAM_ENABLED:-false}
      FREQTRADE__TELEGRAM__TOKEN: ${FREQTRADE_TELEGRAM_TOKEN:-}
      FREQTRADE__TELEGRAM__CHAT_ID: ${FREQTRADE_TELEGRAM_CHAT_ID:-}
      FREQTRADE__DB_URL: sqlite:////workspace/user_data/tradesv3.live.sqlite
    volumes:
      - ./:/workspace
    command:
      - trade
      - --config
      - /workspace/config/config.futures.json
      - --config
      - /workspace/config/config.binance.live.json
      - --strategy
      - SMC_FVG_Context30m_Freqtrade
      - --strategy-path
      - /workspace/src/strategies
      - --logfile
      - /workspace/user_data/logs/freqtrade-live.log
